<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

            <a class="navbar-brand" href="index.html">
                Shake & Bite
            </a>

            <div>

                <a class="btn btn-outline-light me-2" href="index.html">Home</a>

                <a class="btn btn-outline-light me-2" href="menu.html">Menu</a>

                <a class="btn btn-outline-light me-2" href="order.html">Order</a>

                <a class="btn btn-outline-light me-2" href="edit.html">Edit</a>

                <a class="btn btn-outline-light" href="delete.html">Delete</a>

            </div>

        </div>
    </nav>

    <div class="container py-5">

        <h1>Place Your Order</h1>

        <form>

            <div class="mb-3">
                <label class="form-label">Customer Name</label>
                <input type="text" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Select Food</label>

                <select class="form-select">

                    <option>Strawberry Milkshake</option>
                    <option>Takoyaki</option>
                    <option>Crispy Chicken Meal</option>

                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Quantity</label>
                <input type="number" class="form-control">
            </div>

            <button class="btn btn-success">
                Submit Order
            </button>

        </form>

    </div>

</body>
</html>
